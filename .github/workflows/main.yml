name: DOOM Project CI/CD

on:
  push:
    branches: [ "main", "Atualizações" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build project
      run: pnpm build
      env:
        VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
